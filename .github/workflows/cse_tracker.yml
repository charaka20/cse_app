name: CSE Tracker

on:
  schedule:
    # Every 15 min, 03:30–09:30 UTC = 09:00–15:00 Sri Lanka Time (UTC+5:30)
    - cron: "*/15 3-9 * * 1-5"
  workflow_dispatch:   # manual trigger for testing

# Prevent overlapping runs competing for the same DB commit
concurrency:
  group: cse-tracker
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: write    # required for git push back to repo

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so git push doesn't fail on shallow clone
          fetch-depth: 0

      # ── 2. Python ──────────────────────────────────────────────────────
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      # ── 3. System deps (Tesseract OCR + Poppler for pdf2image) ─────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            tesseract-ocr \
            tesseract-ocr-eng \
            poppler-utils

      # ── 4. Python deps ─────────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ── 5. Run tracker ─────────────────────────────────────────────────
      - name: Run CSE Tracker
        env:
          DEEPSEEK_API_KEY:    ${{ secrets.DEEPSEEK_API_KEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      # ── 6. Persist cse_state.db back to repo ───────────────────────────
      # WHY GIT PUSH INSTEAD OF ACTIONS CACHE:
      #   GitHub Actions cache is immutable per key — you cannot update it
      #   mid-run. A new run would restore the stale cache, causing every
      #   announcement to re-process in an infinite duplicate loop.
      #   Solution: commit the DB file directly back to the repo branch.
      #   The [skip ci] flag prevents this commit from triggering a new run.
      - name: Commit state DB back to repository
        if: always()    # run even if main.py exits with error
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add cse_state.db

          # Only commit if there is an actual change
          if git diff --staged --quiet; then
            echo "No DB changes — nothing to commit."
          else
            git commit -m "chore: update cse_state.db [skip ci]"
            git push origin main
          fi
